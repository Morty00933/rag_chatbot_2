{{- if .Values.qdrant.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-qdrant
  labels:
    app.kubernetes.io/name: rag-chatbot
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: qdrant
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.qdrant.ports.http }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.qdrant.ports.grpc }}
      targetPort: grpc
      protocol: TCP
  selector:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: qdrant
{{- end }}
