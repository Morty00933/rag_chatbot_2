{{- if .Values.qdrant.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}-qdrant
  labels:
    app.kubernetes.io/name: rag-chatbot
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: qdrant
spec:
  serviceName: {{ .Release.Name }}-qdrant
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: qdrant
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rag-chatbot
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: qdrant
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: qdrant
          image: "{{ .Values.qdrant.image.repository }}:{{ .Values.qdrant.image.tag }}"
          imagePullPolicy: {{ .Values.qdrant.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.qdrant.ports.http }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.qdrant.ports.grpc }}
              protocol: TCP
          volumeMounts:
            - name: qdrant-data
              mountPath: /qdrant/storage
          resources:
            {{- toYaml .Values.qdrant.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.qdrant.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.qdrant.readinessProbe | nindent 12 }}
      volumes:
        - name: qdrant-data
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-qdrant-data
{{- end }}
