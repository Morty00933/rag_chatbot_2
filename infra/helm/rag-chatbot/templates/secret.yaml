apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app.kubernetes.io/name: rag-chatbot
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  {{- if .Values.infra.external }}
  REDIS_URL: {{ printf "redis://%s:6379/1" .Values.infra.redisHost | b64enc | quote }}
  {{- else }}
  REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.hfApiToken }}
  HF_API_TOKEN: {{ .Values.secrets.hfApiToken | quote }}
  {{- end }}
